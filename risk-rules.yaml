# Risk assessment rules for `terraform plan` changes.
#
# Each rule has a `match` block (all specified fields must match) and a
# `level` + `reason` describing the risk. When multiple rules match a
# single resource change, the HIGHEST level wins.
#
# match fields (all optional; a rule with no match block matches every change):
#   action:            one of create | update | delete | read | no-op
#                      (matches if present in the change's actions array)
#   resource_type:     terraform resource type (e.g. aviatrix_spoke_gateway)
#   resource_address:  full resource address
#                      (e.g. module.mc-spoke.aviatrix_spoke_gateway.default)
#   attribute_changed: attribute whose before/after values differ
#
# level: low | medium | high | critical

- match:
    action: delete
    resource_type: aviatrix_transit_gateway
  level: critical
  reason: >-
    Deleting a transit gateway removes core connectivity for all attached
    spokes. Requires an explicit change window and network engineering approval.

- match:
    action: delete
    resource_type: aviatrix_spoke_gateway
  level: high
  reason: >-
    Deleting a spoke gateway disconnects the associated VNet/VPC from the
    Aviatrix fabric.

- match:
    action: delete
  level: medium
  reason: Destructive change — resource will be removed.

- match:
    action: update
    attribute_changed: cidr
  level: high
  reason: >-
    Changing a CIDR block forces resource recreation and route churn on
    the fabric.

- match:
    action: update
    resource_type: aviatrix_spoke_gateway
    attribute_changed: gw_size
  level: medium
  reason: >-
    Terraform cannot resize an individual gateway in isolation — gateways
    are resized sequentially, and during each resize traffic shifts to the
    remaining peers. Plan the change inside an approved change window.

- match:
    action: update
    resource_type: aviatrix_spoke_gateway
    attribute_changed: ha_gw_size
  level: medium
  reason: >-
    Terraform cannot resize an individual gateway in isolation — gateways
    are resized sequentially, and during each resize traffic shifts to the
    remaining peers. Plan the change inside an approved change window.

- match:
    action: update
    resource_type: aviatrix_transit_gateway
    attribute_changed: gw_size
  level: critical
  reason: >-
    Transit gateway resize is disruptive to fabric-wide connectivity.
    Terraform cannot resize an individual transit gateway in isolation —
    gateways are resized sequentially, and during each resize traffic
    shifts to the remaining peers. Before applying: (1) evaluate the
    current number of tunnels terminating on the transit gateway,
    (2) engage Aviatrix support to perform each transit resize manually
    via the controller inside an approved change window (followed by an
    image upgrade if the current tunnel count exceeds 3K), then
    (3) update the gw_size in this pipeline to match the new size so
    state converges without a second resize.

- match:
    action: update
    resource_type: aviatrix_transit_gateway
    attribute_changed: ha_gw_size
  level: critical
  reason: >-
    Transit gateway resize is disruptive to fabric-wide connectivity.
    Terraform cannot resize an individual transit gateway in isolation —
    gateways are resized sequentially, and during each resize traffic
    shifts to the remaining peers. Before applying: (1) evaluate the
    current number of tunnels terminating on the transit gateway,
    (2) engage Aviatrix support to perform each transit resize manually
    via the controller inside an approved change window (followed by an
    image upgrade if the current tunnel count exceeds 3K), then
    (3) update the ha_gw_size in this pipeline to match the new size so
    state converges without a second resize.

- match:
    action: create
    resource_type: aviatrix_transit_gateway
  level: low
  reason: >-
    Provisioning a new Aviatrix transit gateway. This launches a
    dedicated VM (and its HA peer if enabled) in the cloud VPC/VNet and
    incurs ongoing hourly compute cost. Transit gateways are
    foundational to the fabric topology.

- match:
    action: create
    resource_type: aviatrix_spoke_gateway
  level: low
  reason: >-
    Provisioning a new Aviatrix spoke gateway. Launches a dedicated VM
    (and its HA peer if enabled) in the target VPC/VNet and incurs
    ongoing hourly compute cost.

- match:
    action: create
    resource_type: aviatrix_spoke_transit_attachment
  level: low
  reason: >-
    Attaching a spoke to a transit gateway. Establishes IPSec/underlay
    tunnels between the two gateways and injects the spoke's CIDR into
    the transit's route table — the spoke's workloads become reachable
    across the fabric once this applies.

- match:
    action: create
    resource_type: aviatrix_vpc
  level: low
  reason: >-
    Registering a new VPC/VNet with the Aviatrix controller (or creating
    one via the controller). Consumes an IP block from the account's
    address space and adds a fabric-managed network.

- match:
    action: create
  level: low
  reason: Additive change — new resource will be created.

- match:
    action: update
    attribute_changed: tags
  level: low
  reason: >-
    Tag-only change. Updates cloud resource labels/metadata; no impact
    to routing, connectivity, or capacity.

- match:
    action: update
  level: low
  reason: In-place attribute update.
